<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor NEXO — Plataforma de Monitoramento Assistencial</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app-shell">

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <svg class="brand-logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="6" width="28" height="22" rx="3" stroke="#fff" stroke-width="2.2"/>
      <rect x="12" y="28" width="12" height="2.5" rx="1" fill="#fff"/>
      <rect x="9" y="30.5" width="18" height="2" rx="1" fill="rgba(255,255,255,.6)"/>
      <polyline points="8,19 13,19 15,12 18,24 21,15 23,19 28,19" stroke="#5fb8d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="brand-text">Monitor <strong>NEXO</strong></span>
  </div>

  <nav class="sidebar-nav">
    <a class="nav-item" href="#home" data-page="home">
      <span class="nav-icon">🏠</span><span>Inicio</span>
    </a>

    <div class="nav-section-label">UNIDADES</div>
    <a class="nav-item" href="#uti/1" data-page="uti" data-uti-id="1">
      <span class="nav-icon">🏥</span><span id="nav-uti-1">UTI 1</span>
    </a>
    <a class="nav-item" href="#uti/2" data-page="uti" data-uti-id="2">
      <span class="nav-icon">🏥</span><span id="nav-uti-2">UTI 2</span>
    </a>
    <a class="nav-item" href="#uti/3" data-page="uti" data-uti-id="3">
      <span class="nav-icon">🏥</span><span id="nav-uti-3">UTI 3</span>
    </a>

    <div class="nav-section-label">GESTAO</div>
    <a class="nav-item" href="#registros" data-page="registros">
      <span class="nav-icon">📋</span><span>Registros</span>
    </a>
    <a class="nav-item" href="#dashboard" data-page="dashboard">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-date" id="sidebar-date"></div>
    <div class="sidebar-version">Monitor NEXO v3.0</div>
  </div>
</aside>

<!-- ═══════════════════ WRAPPER ═══════════════════ -->
<div class="wrapper">

  <header class="topbar">
    <button class="menu-toggle" id="menu-toggle" aria-label="Menu">&#x2630;</button>
    <h1 class="topbar-title" id="topbar-title">Inicio</h1>
    <div class="topbar-right">
      <span class="census-badge" id="census-badge" title="Pacientes internados">
        <span class="census-dot"></span>
        <span id="census-count">&mdash;</span> internados
      </span>
    </div>
  </header>

  <main class="main-content" id="main-content">
    <div class="page-loader" id="page-loader">
      <div class="spinner"></div>
    </div>
  </main>

</div>

</div><!-- /app-shell -->

<!-- ═══════════════════ MODAL ═══════════════════ -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ═══════════════════ TOAST ═══════════════════ -->
<div class="toast-container" id="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
